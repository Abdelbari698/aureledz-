<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURELE — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0f0f0f;color:#e5e5e5;min-height:100vh}
:root{--gold:#C9A96E;--gold-d:#A8873F;--noir:#1A1A1A;--wa:#25D366;--r:6px;
--att:#f59e0b;--conf:#3b82f6;--prep:#8b5cf6;--exp:#06b6d4;--liv:#22c55e;--ann:#ef4444}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1a1a}
.box{background:#111;border:1px solid rgba(201,169,110,.3);border-radius:14px;padding:2.5rem;width:340px;text-align:center}
.logo{font-family:'Lora',serif;font-size:2rem;letter-spacing:.3em;color:var(--gold);margin-bottom:.3rem}
.sub{font-size:.6rem;letter-spacing:.2em;color:#555;text-transform:uppercase;margin-bottom:2rem}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:.6rem;font-size:.72rem;color:#ef4444;margin-bottom:.8rem;display:none}
input[type=password]{width:100%;padding:12px 14px;background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:var(--r);color:#e5e5e5;font-size:.9rem;outline:none;margin-bottom:.8rem;font-family:'Poppins',sans-serif}
input[type=password]:focus{border-color:var(--gold)}
.btn-login{width:100%;padding:13px;background:var(--gold);color:#111;border:none;border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:.2s}
.btn-login:hover{background:var(--gold-d)}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
#app.show{display:flex}
.hdr{background:#111;border-bottom:1px solid rgba(201,169,110,.15);padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo{font-family:'Lora',serif;font-size:1.1rem;letter-spacing:.2em;color:var(--gold)}
.hdr-right{display:flex;gap:.8rem;align-items:center}
.badge{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.08);color:#666;background:#1a1a1a}
.badge.red{background:rgba(239,68,68,.1);color:#ef4444;border-color:rgba(239,68,68,.2)}
.btn-out{background:none;border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:5px 14px;border-radius:4px;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'Poppins',sans-serif}

main{flex:1;padding:1.5rem 2rem;max-width:1400px;margin:0 auto;width:100%}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;margin-bottom:1.5rem}
.stat{background:#111;border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:1.1rem;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.stat.tot::before{background:#444} .stat.att::before{background:var(--att)}
.stat.conf::before{background:var(--conf)} .stat.liv::before{background:var(--liv)}
.stat.ann::before{background:var(--ann)} .stat.rev::before{background:var(--gold)}
.sn{font-family:'Lora',serif;font-size:1.9rem;font-weight:400;line-height:1;margin-bottom:.2rem}
.stat.tot .sn{color:#e5e5e5} .stat.att .sn{color:var(--att)} .stat.conf .sn{color:var(--conf)}
.stat.liv .sn{color:var(--liv)} .stat.ann .sn{color:var(--ann)} .stat.rev .sn{color:var(--gold)}
.sl{font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:#555}

/* TOOLBAR */
.tb{display:flex;align-items:center;gap:.7rem;margin-bottom:1rem;flex-wrap:wrap}
.tb-title{font-family:'Lora',serif;font-size:1rem;color:#e5e5e5;margin-right:auto;font-weight:400}
.sinp{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:7px 12px;color:#e5e5e5;font-size:.72rem;outline:none;width:200px;font-family:'Poppins',sans-serif}
.sinp:focus{border-color:var(--gold)}
select.sinp{cursor:pointer}
.btn-ref{background:#111;border:1px solid rgba(201,169,110,.25);color:var(--gold);padding:7px 14px;border-radius:var(--r);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'Poppins',sans-serif;display:flex;align-items:center;gap:5px}
.btn-ref:hover{background:rgba(201,169,110,.08)}
.btn-ref.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-csv{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e;padding:7px 14px;border-radius:var(--r);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'Poppins',sans-serif}

/* TABLE */
.tw{background:#111;border:1px solid rgba(255,255,255,.06);border-radius:var(--r);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:800px}
th{padding:.75rem 1rem;font-size:.56rem;letter-spacing:.15em;text-transform:uppercase;color:#555;text-align:left;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;white-space:nowrap}
th:hover{color:var(--gold)}
tr.row{border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:.15s}
tr.row:hover{background:rgba(255,255,255,.025)}
td{padding:.8rem 1rem;font-size:.74rem;color:#ccc;vertical-align:middle}
.ref{font-family:'Courier New',monospace;font-size:.7rem;color:var(--gold);font-weight:600}
.dt{font-size:.66rem;color:#555}
.prod{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e5e5e5;font-weight:500}
.cn{color:#e5e5e5;font-weight:500}
.ph{font-size:.68rem;color:#60a5fa;text-decoration:none}
.ph:hover{text-decoration:underline}
.wil{font-size:.7rem}
.lv{font-size:.62rem;padding:2px 8px;border-radius:20px}
.lv.dom{background:rgba(99,102,241,.15);color:#818cf8}
.lv.bur{background:rgba(6,182,212,.15);color:#22d3ee}
.tot{font-family:'Lora',serif;font-size:.9rem;color:var(--gold);font-weight:500}
.st{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.st::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.s0{background:rgba(245,158,11,.1);color:var(--att)}
.s1{background:rgba(59,130,246,.1);color:var(--conf)}
.s2{background:rgba(139,92,246,.1);color:var(--prep)}
.s3{background:rgba(6,182,212,.1);color:var(--exp)}
.s4{background:rgba(34,197,94,.1);color:var(--liv)}
.s5{background:rgba(239,68,68,.1);color:var(--ann)}
.acts{display:flex;gap:4px}
.ab{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.08);background:none;border-radius:3px;cursor:pointer;color:#555;transition:.2s}
.ab:hover{border-color:var(--gold);color:var(--gold)}
.ab.d:hover{border-color:#ef4444;color:#ef4444}
.ab.p:hover{border-color:#22c55e;color:#22c55e}

/* Page d'impression */
@media print{
  body{background:#fff!important;color:#000!important}
  .hdr,.toolbar,.tb,.stats,.config-box,.acts{display:none!important}
  .twrap{border:none!important;box-shadow:none!important}
  .print-slip{display:block!important}
}
.print-slip{display:none}
.empty{text-align:center;padding:3rem;color:#444}
.empty-i{font-size:2rem;margin-bottom:.8rem;opacity:.25}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:.25s}
.mbg.open{opacity:1;pointer-events:all}
.modal{background:#111;border:1px solid rgba(201,169,110,.2);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:.25s}
.mbg.open .modal{transform:translateY(0)}
.mhdr{padding:1.1rem 1.3rem;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#111;z-index:1}
.mhdr h3{font-family:'Lora',serif;font-size:.95rem;color:var(--gold);font-weight:400}
.mcls{background:none;border:none;color:#555;font-size:1.2rem;cursor:pointer;padding:0 4px;line-height:1;transition:.2s}
.mcls:hover{color:#e5e5e5}
.mbody{padding:1.3rem}
.dr{display:flex;justify-content:space-between;align-items:flex-start;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.03)}
.dr:last-child{border:none}
.dl{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#444;width:110px;flex-shrink:0}
.dv{font-size:.78rem;color:#ccc;text-align:right;flex:1}
.dv.g{color:var(--gold);font-family:'Lora',serif;font-size:.92rem}
.dv.w{color:#e5e5e5;font-weight:500}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin:1rem 0}
.so{padding:7px 4px;border-radius:4px;font-size:.58rem;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;text-align:center;border:1px solid rgba(255,255,255,.07);background:none;color:#555;font-family:'Poppins',sans-serif;transition:.2s}
.so.on{font-weight:600}
.so.a0.on{background:rgba(245,158,11,.12);border-color:var(--att);color:var(--att)}
.so.a1.on{background:rgba(59,130,246,.12);border-color:var(--conf);color:var(--conf)}
.so.a2.on{background:rgba(139,92,246,.12);border-color:var(--prep);color:var(--prep)}
.so.a3.on{background:rgba(6,182,212,.12);border-color:var(--exp);color:var(--exp)}
.so.a4.on{background:rgba(34,197,94,.12);border-color:var(--liv);color:var(--liv)}
.so.a5.on{background:rgba(239,68,68,.12);border-color:var(--ann);color:var(--ann)}
.macts{display:flex;gap:.6rem;margin-top:1.1rem}
.bcall{flex:1;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:.66rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.bcall:hover{background:#2563eb}
.bsave{flex:1;padding:10px;background:var(--gold);color:#111;border:none;border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:.66rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:.2s}
.bsave:hover{background:var(--gold-d)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#111;border:1px solid var(--gold);color:var(--gold);padding:10px 18px;border-radius:var(--r);font-size:.7rem;z-index:9999;transform:translateY(20px);opacity:0;transition:.3s;pointer-events:none;max-width:280px}
.toast.on{transform:translateY(0);opacity:1}

@media(max-width:700px){main{padding:1rem}.stats{grid-template-columns:repeat(2,1fr)}.sinp{width:130px}}
</style>
</head>
<body>

<div class="toast" id="T"></div>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <div class="logo">AURELE</div>
    <div class="sub">Gestion des Commandes</div>
    <div class="err" id="err">Mot de passe incorrect</div>
    <input type="password" id="pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">CONNEXION</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hdr-logo">AURELE</div>
    <div class="hdr-right">
      <div class="badge" id="hdate"></div>
      <div class="badge red" id="hatt">0 en attente</div>
      <button class="btn-out" onclick="logout()">Deconnexion</button>
    </div>
  </div>
  <main>
    <div class="stats">
      <div class="stat tot"><div class="sn" id="S0">0</div><div class="sl">Total</div></div>
      <div class="stat att"><div class="sn" id="S1">0</div><div class="sl">En attente</div></div>
      <div class="stat conf"><div class="sn" id="S2">0</div><div class="sl">Confirmees</div></div>
      <div class="stat liv"><div class="sn" id="S3">0</div><div class="sl">Livrees</div></div>
      <div class="stat ann"><div class="sn" id="S4">0</div><div class="sl">Annulees</div></div>
      <div class="stat rev"><div class="sn" id="S5">0</div><div class="sl">Revenu DZD</div></div>
    </div>
    <div class="tb">
      <div class="tb-title">Commandes</div>
      <input class="sinp" id="sq" placeholder="Rechercher..." oninput="draw()">
      <select class="sinp" id="sf" onchange="draw()">
        <option value="">Tous statuts</option>
        <option>⏳ En attente</option>
        <option>✅ Confirmee</option>
        <option>📦 En preparation</option>
        <option>🚚 Expediee</option>
        <option>🎉 Livree</option>
        <option>❌ Annulee</option>
      </select>
      <button class="btn-ref" onclick="window.open('https://docs.google.com/spreadsheets/d/1QFHB2uHAF4bSljKvrkLip2pgnGVKygH-pYZwM2cvSIw/edit','_blank')" style="background:rgba(52,168,83,.1);border-color:rgba(52,168,83,.3);color:#34a853">📊 Sheet</button>
      <button class="btn-ref" id="BR" onclick="sync()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Actualiser
      </button>
      <button class="btn-csv" onclick="xcsv()">Exporter CSV</button>
    </div>
    <div class="tw">
      <table>
        <thead><tr>
          <th onclick="sort('ref')">Ref</th>
          <th onclick="sort('date')">Date</th>
          <th>Produit</th>
          <th onclick="sort('nom')">Client</th>
          <th>Wilaya</th>
          <th>Livraison</th>
          <th onclick="sort('total')">Total</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr></thead>
        <tbody id="TB"></tbody>
      </table>
      <div class="empty" id="EM" style="display:none">
        <div class="empty-i">📋</div>
        <div>Aucune commande</div>
        <div style="font-size:.7rem;color:#444;margin-top:.3rem">Les commandes apparaitront ici</div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="mbg" id="MB" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="mhdr">
      <h3 id="MR">Commande</h3>
      <button class="mcls" onclick="closeM()">&#10005;</button>
    </div>
    <div class="mbody">
      <div id="MC"></div>
      <div style="font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#444;margin:.9rem 0 .5rem">Changer statut</div>
      <div class="sg">
        <button class="so a0" onclick="setSt('⏳ En attente',this)">⏳ Attente</button>
        <button class="so a1" onclick="setSt('✅ Confirmee',this)">✅ Confirmee</button>
        <button class="so a2" onclick="setSt('📦 En preparation',this)">📦 Prep.</button>
        <button class="so a3" onclick="setSt('🚚 Expediee',this)">🚚 Expediee</button>
        <button class="so a4" onclick="setSt('🎉 Livree',this)">🎉 Livree</button>
        <button class="so a5" onclick="setSt('❌ Annulee',this)">❌ Annulee</button>
      </div>
      <div class="macts">
        <button class="bcall" id="BPRINT" onclick="printOrder(cur?cur.ref:'')" style="background:#22c55e;flex:.5">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Imprimer
        </button>
        <button class="bcall" id="BCA">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Appeler
        </button>
        <button class="bsave" onclick="saveSt()">✓ Sauvegarder</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const SHEET_ID = '1QFHB2uHAF4bSljKvrkLip2pgnGVKygH-pYZwM2cvSIw';
const GVIZ = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
const CSV  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0`;

// ── AUTH ──
function checkP(p){ return ['aurele2025','admin','aurele','2025'].includes((p||'').trim()); }

function login(){
  const p = document.getElementById('pwd').value;
  if(checkP(p)){
    localStorage.setItem('adash','1');
    show();
  } else {
    const e=document.getElementById('err');
    e.style.display='block';
    setTimeout(()=>e.style.display='none',3000);
  }
}

function logout(){
  localStorage.removeItem('adash');
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('pwd').value='';
}

function show(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  document.getElementById('hdate').textContent=new Date().toLocaleDateString('fr-DZ',{weekday:'short',day:'numeric',month:'short'});
  draw(); updateStats();
  setTimeout(sync, 800);
  setInterval(sync, 120000);
}

// Auto-login
window.addEventListener('DOMContentLoaded',()=>{
  const p = new URLSearchParams(location.search).get('pwd');
  if(checkP(p)||localStorage.getItem('adash')==='1') show();
});

// ── DATA ──
let orders = JSON.parse(localStorage.getItem('aord')||'[]');
const SHEETDB = 'https://sheetdb.io/api/v1/fw5ph1tnun1zh';
const SHEETS_URL = localStorage.getItem('aurele_sheets_url') || 'https://script.google.com/macros/s/AKfycbxu8OYl6Hpys39uCPRleE5AWkvyyy1jxzNawgO6a6kMs3MhTyNd5H1mUu_0_SRQeDVd/exec';
let cur=null, curSt='', sortK='date', sortD=-1;

function save(){ localStorage.setItem('aord',JSON.stringify(orders)); }

// ── SYNC FROM SHEETS ──
/* Mettre à jour le statut dans Google Sheets */
function updateSheetStatus(ref, statut) {
  /* PATCH avec Référence sans encodage — marche avec SheetDB */
  fetch(SHEETDB + '/Référence/' + encodeURIComponent(ref), {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
    body: JSON.stringify({data: {'Statut': statut}})
  })
  .then(r => r.json())
  .then(res => {
    if(res && res.updated > 0){
      toast('✅ Synchronisé sur tous les appareils !');
    } else {
      toast('⚠️ ' + JSON.stringify(res).slice(0,60));
    }
  })
  .catch(err => toast('❌ ' + err.message));
}

function fixDate(v) {
  if (!v) return '';
  const s = String(v);
  /* Google Sheets retourne: Date(2026,5,9,21,23,43) — mois commence à 0 */
  const m = s.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if (m) {
    const yr=m[1], mo=String(Number(m[2])+1).padStart(2,'0'), dy=String(m[3]).padStart(2,'0');
    const hr=m[4]?String(m[4]).padStart(2,'0'):'', mn=m[5]?String(m[5]).padStart(2,'0'):'';
    return dy+'/'+mo+'/'+yr + (hr ? ' '+hr+':'+mn : '');
  }
  return s;
}

function fixVal(v) {
  if (!v) return '';
  const s = String(v);
  /* Corriger aussi les valeurs Date dans les autres champs (ex: adresse) */
  return s.replace(/Date\((\d+),(\d+),(\d+)(?:,[^)]+)?\)/g, (_, yr, mo, dy) => {
    return String(dy).padStart(2,'0')+'/'+String(Number(mo)+1).padStart(2,'0')+'/'+yr;
  });
}

function processRow(o){
  const ref=o['Référence']||o['Reference']||o['RÃ©fÃ©rence']||'';
  if(!ref||ref==='Référence'||ref==='Reference') return false;
  if(orders.find(x=>x.ref===ref)) return false;
  /* Ne pas recharger les commandes supprimées */
  const deleted=JSON.parse(localStorage.getItem('aord_deleted')||'[]');
  if(deleted.includes(ref)) return false;
  orders.unshift({
    ref,id:Date.now()+Math.random(),
    date:fixDate(o['Date'])||'',
    produit:fixVal(o['Produit'])||'',
    nom:fixVal(o['Nom Client'])||'',
    telephone:o['Téléphone']||o['Telephone']||o['TÃ©lÃ©phone']||'',
    wilaya:fixVal(o['Wilaya'])||'',
    adresse:fixVal(o['Adresse'])||'',
    mode_livraison:fixVal(o['Mode Livraison'])||'',
    prix_produit:Number(o['Prix Produit']||0),
    frais_livraison:Number(o['Frais Livraison']||0),
    total:Number(o['Total DZD']||o['Total']||0),
    message:fixVal(o['Message'])||'',
    collection:fixVal(o['Collection'])||'',
    categorie:o['Catégorie']||o['CatÃ©gorie']||'',
    statut:o['Statut']||'⏳ En attente'
  });
  return true;
}

function sync(){
  const br = document.getElementById('BR');
  br.classList.add('spin');
  const deleted = JSON.parse(localStorage.getItem('aord_deleted')||'[]');

  fetch(SHEETDB)
    .then(r => r.json())
    .then(rows => {
      if(!rows||!rows.length){br.classList.remove('spin');toast('Sheet vide');return;}
      
      let added=0, synced=0;
      rows.forEach(o => {
        const ref = o['Référence']||'';
        if(!ref) return;
        const statut = o['Statut']||'⏳ En attente';

        /* Si supprimé dans Sheet → supprimer localement */
        if(statut.includes('Supprim')){
          const before = orders.length;
          orders = orders.filter(x => x.ref !== ref);
          if(!deleted.includes(ref)) deleted.push(ref);
          return;
        }

        /* Mettre à jour statut si commande existe déjà */
        const existing = orders.find(x => x.ref === ref);
        if(existing){
          if(existing.statut !== statut){
            existing.statut = statut;
            synced++;
          }
          return;
        }

        /* Nouvelle commande */
        if(deleted.includes(ref)) return;
        orders.unshift({
          ref, id:Date.now()+Math.random(),
          date:o['Date']||'',
          produit:o['Produit']||'',
          nom:o['Nom Client']||'',
          telephone:o['Téléphone']||'',
          wilaya:o['Wilaya']||'',
          adresse:o['Adresse']||'',
          mode_livraison:o['Mode Livraison']||'',
          prix_produit:Number(o['Prix Produit']||0),
          frais_livraison:Number(o['Frais Livraison']||0),
          total:Number(o['Total DZD']||o['Total']||0),
          message:o['Message']||'',
          collection:o['Collection']||'',
          categorie:o['Catégorie']||'',
          statut:statut
        });
        added++;
      });

      localStorage.setItem('aord_deleted', JSON.stringify(deleted));
      /* Appliquer les statuts sauvegardés localement par dessus */
      const statuts = JSON.parse(localStorage.getItem('aord_statuts')||'{}');
      orders.forEach(o => { if(statuts[o.ref]) o.statut = statuts[o.ref]; });
      save(); draw(); updateStats();
      br.classList.remove('spin');
      toast('✓ Sync: +'+added+' nouvelle(s), '+synced+' statut(s) mis à jour');
    })
    .catch(() => {
      /* Fallback CSV */
      fetch('https://docs.google.com/spreadsheets/d/1QFHB2uHAF4bSljKvrkLip2pgnGVKygH-pYZwM2cvSIw/export?format=csv&gid=0')
        .then(r=>r.text())
        .then(csv=>{
          const rows=parseCSV(csv);
          if(rows.length<2){br.classList.remove('spin');return;}
          const headers=rows[0].map(h=>h.trim());
          let added=0;
          for(let i=1;i<rows.length;i++){
            const row=rows[i];if(!row[0])continue;
            const o={};headers.forEach((h,j)=>o[h]=(row[j]||'').trim());
            const ref=o['Référence']||row[0]||'';
            if(!ref||ref==='Référence')continue;
            if(deleted.includes(ref))continue;
            if(o['Statut']&&o['Statut'].includes('Supprim'))continue;
            const ex=orders.find(x=>x.ref===ref);
            if(ex){if(o['Statut'])ex.statut=o['Statut'];continue;}
            orders.unshift({ref,id:Date.now()+Math.random(),date:o['Date']||'',produit:o['Produit']||'',nom:o['Nom Client']||'',telephone:o['Téléphone']||'',wilaya:o['Wilaya']||'',adresse:o['Adresse']||'',mode_livraison:o['Mode Livraison']||'',prix_produit:Number(o['Prix Produit']||0),frais_livraison:Number(o['Frais Livraison']||0),total:Number(o['Total DZD']||o['Total']||0),message:o['Message']||'',collection:o['Collection']||'',statut:o['Statut']||'⏳ En attente'});
            added++;
          }
          const statuts2 = JSON.parse(localStorage.getItem('aord_statuts')||'{}');
          orders.forEach(o => { if(statuts2[o.ref]) o.statut = statuts2[o.ref]; });
          save();draw();updateStats();
          br.classList.remove('spin');
          toast('✓ '+added+' commande(s) chargée(s)');
        })
        .catch(()=>{br.classList.remove('spin');toast('⚠ Vérifier le Sheet');});
    });
}

function parseCSV(t){
  const rows=[]; let row=[],f='',q=false;
  t=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<t.length;i++){
    const c=t[i];
    if(q){if(c==='"'){if(t[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{
      if(c==='"')q=true;
      else if(c===','){row.push(f);f='';}
      else if(c==='\n'){row.push(f);f='';if(row.some(x=>x!==''))rows.push(row);row=[];}
      else f+=c;
    }
  }
  if(row.length){row.push(f);if(row.some(x=>x!==''))rows.push(row);}
  return rows;
}

// ── RENDER ──
function scls(s){
  if(!s) return 's0';
  if(s.includes('attente')||s.includes('Attente')) return 's0';
  if(s.includes('onfirm')) return 's1';
  if(s.includes('paration')||s.includes('rep')) return 's2';
  if(s.includes('xpedi')) return 's3';
  if(s.includes('ivr')) return 's4';
  if(s.includes('nnul')) return 's5';
  return 's0';
}

function filtered(){
  const q=(document.getElementById('sq').value||'').toLowerCase();
  const sf=document.getElementById('sf').value;
  let d=[...orders];
  if(q) d=d.filter(o=>(o.ref+o.nom+o.produit+o.wilaya+o.telephone).toLowerCase().includes(q));
  if(sf) d=d.filter(o=>o.statut===sf);
  d.sort((a,b)=>{
    const av=sortK==='total'?Number(a[sortK]):(a[sortK]||'');
    const bv=sortK==='total'?Number(b[sortK]):(b[sortK]||'');
    return av<bv?sortD:av>bv?-sortD:0;
  });
  return d;
}

function sort(k){sortK===k?sortD*=-1:(sortK=k,sortD=-1);draw();}

// ── STATS ──
function updateStats(){
  const o=orders;
  document.getElementById('S0').textContent=o.length;
  document.getElementById('S1').textContent=o.filter(x=>x.statut&&x.statut.toLowerCase().includes('attente')).length;
  document.getElementById('S2').textContent=o.filter(x=>x.statut&&x.statut.toLowerCase().includes('onfirm')).length;
  document.getElementById('S3').textContent=o.filter(x=>x.statut&&x.statut.toLowerCase().includes('ivr')).length;
  document.getElementById('S4').textContent=o.filter(x=>x.statut&&x.statut.toLowerCase().includes('nnul')).length;
  const rev=o.filter(x=>!x.statut||!x.statut.toLowerCase().includes('nnul')).reduce((s,x)=>s+Number(x.total||0),0);
  document.getElementById('S5').textContent=rev.toLocaleString();
  const att=o.filter(x=>!x.statut||x.statut.toLowerCase().includes('attente')).length;
  document.getElementById('hatt').textContent=att+' en attente';
}

// ── MODAL ──
function openM(ref){
  const o=orders.find(x=>x.ref===ref); if(!o) return;
  cur=o; curSt=o.statut||'⏳ En attente';
  document.getElementById('MR').textContent='📦 '+o.ref;
  const rows=[
    ['Produit',o.produit,'w'],['Date',o.date,''],['Client',o.nom,'w'],
    ['Telephone',fixPhone(o.telephone)||o.telephone,''],['Wilaya',o.wilaya,''],['Adresse',o.adresse||'(non fournie)',''],
    ['Livraison',o.mode_livraison,''],['Prix',Number(o.prix_produit||0).toLocaleString()+' DZD',''],
    ['Frais',Number(o.frais_livraison||0).toLocaleString()+' DZD',''],
    ['Total',Number(o.total||0).toLocaleString()+' DZD','g'],
    ['Message',o.message||'(aucun)',''],['Collection',o.collection||'-',''],
  ];
  document.getElementById('MC').innerHTML=rows.map(([l,v,c])=>
    `<div class="dr"><span class="dl">${l}</span><span class="dv ${c}">${v}</span></div>`
  ).join('');
  document.querySelectorAll('.so').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.so').forEach(b=>{
    if(curSt.toLowerCase().includes(b.textContent.replace(/[⏳✅📦🚚🎉❌]/g,'').trim().toLowerCase().slice(0,4)))
      b.classList.add('on');
  });
  document.getElementById('BCA').onclick=()=>call(fixPhone(o.telephone)||o.telephone);
  document.getElementById('MB').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeM(){document.getElementById('MB').classList.remove('open');document.body.style.overflow='';}
function setSt(s,b){curSt=s;document.querySelectorAll('.so').forEach(x=>x.classList.remove('on'));b.classList.add('on');}
function saveSt(){
  if(!cur)return;
  const o=orders.find(x=>x.ref===cur.ref);
  if(o){
    o.statut=curSt;
    save();draw();updateStats();
    /* Sauvegarder dans localStorage pour persister après refresh */
    const statuts = JSON.parse(localStorage.getItem('aord_statuts')||'{}');
    statuts[o.ref] = curSt;
    localStorage.setItem('aord_statuts', JSON.stringify(statuts));
    /* Essayer SheetDB en arrière-plan */
    updateSheetStatus(o.ref, curSt);
    toast('✓ Statut: '+curSt);
    closeM();
  }
}

// ── ACTIONS ──
function fixPhone(p){
  if(!p) return '';
  let n = p.toString().replace(/[\s\-\.]/g,'');
  /* Ajouter 0 si 9 chiffres (ex: 668984803 → 0668984803) */
  if(/^[5-7][0-9]{8}$/.test(n)) n = '0' + n;
  return n;
}

function call(p){
  if(!p){toast('Numero introuvable');return;}
  const n = fixPhone(p);
  const intl = n.startsWith('0') ? '+213'+n.slice(1) : (n.startsWith('213')&&!n.startsWith('+') ? '+'+n : n);
  location.href='tel:'+intl;
}

function del(ref){
  if(!confirm('Supprimer sur CET appareil.\n\nPour supprimer sur TOUS les appareils → ouvrir le Sheet et mettre le statut "❌ Supprimée"\n\nContinuer ?'))return;
  orders=orders.filter(o=>o.ref!==ref);
  /* Mémoriser localement */
  const deleted=JSON.parse(localStorage.getItem('aord_deleted')||'[]');
  if(!deleted.includes(ref)) deleted.push(ref);
  localStorage.setItem('aord_deleted',JSON.stringify(deleted));
  save();draw();updateStats();
  /* Marquer comme supprimée dans Google Sheets aussi */
  updateSheetStatus(ref,'❌ Supprimée');
  toast('Commande supprimée');
}

function xcsv(){
  const h=['Ref','Date','Produit','Client','Tel','Wilaya','Adresse','Livraison','Total','Statut','Collection','Message'];
  const rows=orders.map(o=>[o.ref,o.date,o.produit,o.nom,o.telephone,o.wilaya,o.adresse,o.mode_livraison,o.total,o.statut,o.collection,o.message]
    .map(v=>'"'+(v||'').toString().replace(/"/g,'""')+'"').join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='commandes-aurele-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();toast('✓ Export CSV');
}
